apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bjw-s.common.lib.chart.names.fullname" . }}-templates
  labels:
    {{- include "bjw-s.common.lib.metadata.allLabels" . | nindent 4 }}
data:
  {{- range $path, $_ := .Files.Glob "k8s-templates/**" }}
  {{ $path | base }}: |{{- $.Files.Get $path | nindent 4 }}
  {{- end }}
  {{- range $path, $_ := .Files.Glob "game-server-templates/**" }}
  {{ $path | base }}: |{{- $.Files.Get $path | nindent 4 }}
  {{- end }}
